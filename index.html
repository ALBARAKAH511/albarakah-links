<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>روابط جمعية البركة</title>
  <meta name="description" content="جمعية البركة الخيرية - بعطائكم ندعم الأسر المستفيدة">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: "Tajawal", sans-serif;
      background: linear-gradient(180deg, #016b6b 0%, #c5eded 100%);
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .wrap { width: 100%; max-width: 720px }
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      text-align: center;
    }
    .logo {
      width: 84px;
      height: 84px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px #0003;
      background: #fff;
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transition: transform .25s ease;
    }
    .logo:hover img { transform: scale(1.05) }
    h1 { font-size: 1.6rem; margin: 0; color: #ffffff }
    .tag {
      color: #e0f2fe;
      font-size: .98rem;
      text-shadow: 0 1px 3px #0006;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      margin-top: 6px;
    }
    .btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: #c5eded;
      color: #0b7a79;
      text-decoration: none;
      border-radius: 14px;
      border: 1px solid #0b7a79;
      transition: .18s;
      width: 100%;
      max-width: 400px;
      justify-content: center;
      text-align: center;
      font-weight: 700;
      direction: rtl;
    }
    .btn:hover {
      transform: translateY(-2px);
      border-color: #0bbbba;
      background: #e0f7f7;
      color: #0bbbba;
    }
    .btn .icon {
      width: 22px;
      text-align: center;
      color: #6f6f6f;
      transition: color .2s;
      font-size: 1.05rem;
    }
    .btn:hover .icon { color: #0bbbba }
    @media (max-width:560px) { .grid { flex-direction: column } }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="profile">
      <div class="logo">
        <img src="https://i.imgur.com/3XQwdvN.png" alt="شعار جمعية البركة" />
      </div>
      <div>
        <h1>جمعية البركة الخيرية</h1>
        <div class="tag">بعطائكم ندعم الأسر المستفيدة</div>
      </div>
    </section>

    <div class="list">
      <a class="btn" href="https://albarakah.org.sa/" target="_blank"><span class="icon">🏠</span>الموقع الرسمي</a>
      <a class="btn" href="https://store.albarakah.org.sa/" target="_blank"><span class="icon">🛒</span>المتجر الإلكتروني</a>
      <a class="btn" href="https://api.whatsapp.com/send?phone=966138919898" target="_blank"><span class="icon">💬</span>واتساب </a>
      <a class="btn" href="https://www.youtube.com/watch?v=IgIY3NR-XCA" target="_blank"><span class="icon">🎬</span>ثمرات عطائكم 2025</a>

      <a class="btn" href="https://albarakah-my.sharepoint.com/:b:/g/personal/a_alsharifi_albarakah_org_sa/IQDfyaGE5R49TZgADa5HnRrLARpaHjAn15_8pya0VAtNV-c?e=2B2V6N" target="_blank"><span class="icon">📄</span>شروط تقديم المساعدة</a>

      <a class="btn" href="https://albarakah-my.sharepoint.com/:b:/g/personal/a_alsharifi_albarakah_org_sa/ETMNz285OWtGnTkbtjxSF7kBpsmwzN-lSmrppf9m_umLog?e=WibNaz-" target="_blank"><span class="icon">📂</span>طريقة استخراج الوثائق</a>
      <a class="btn" href="https://albarakah-my.sharepoint.com/:b:/g/personal/a_alsharifi_albarakah_org_sa/EeF7wvo8khhPmWTxZL0orFUBbx2zNz8lYgzAdO0JgOq_yA?e=gQwTCs" target="_blank"><span class="icon">ℹ️</span>بيان الإفصاح</a>
      <a class="btn" href="https://albarakah.org.sa/registration-image/" target="_blank"><span class="icon">📋</span>الترخيص</a>
      <a class="btn" href="https://albarakah.org.sa/laws/" target="_blank"><span class="icon">📑</span>السياسات واللوائح</a>

      <!-- الإضافات الجديدة في النهاية -->
      <a class="btn" href="https://albarakah.org.sa/contact-us/" target="_blank">
        <span class="icon">🧑‍💼</span>التقديم على الوظائف
      </a>

      <a class="btn" href="https://albarakah511.github.io/albarakah-branches/" target="_blank">
        <span class="icon">📍</span>فروع جمعية البركة الخيرية
      </a>

    </div>
  </main>
</body>
</html>
